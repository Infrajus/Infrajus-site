<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infrajus</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at center,
    #2a2f5a 0%,
    #0b1a2a 50%,
    #060912 100%);
  color: #eaeef2;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-family: "Space Grotesk", sans-serif;
  font-size: 84px;
  letter-spacing: 12px;
  margin: 0;
}

p {
  font-size: 20px;
  margin-top: 10px;
  opacity: 0.9;
}

button {
  margin-top: 25px;
  padding: 12px 24px;
  border: 1px solid #cbb38a;
  background: transparent;
  color: #fff;
  cursor: pointer;
}

/* SEÇÕES */
.section {
  padding: 80px 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  font-size: 28px;
  margin-bottom: 20px;
  color: #cfd6dd;
}

.card {
  padding: 15px;
  border-left: 2px solid #cbb38a;
  margin-bottom: 10px;
}
</style>

</head>

<body>

<div class="hero">
  <h1>INFRAJUS</h1>
  <p>Inteligência Pericial</p>
  <button>Conhecer o Instituto</button>
</div>

<div class="section">
  <h2>Áreas de atuação</h2>
  <div class="card">Perícia Criminal</div>
  <div class="card">Grafotécnica</div>
  <div class="card">Documentoscopia</div>
  <div class="card">Investigação Técnico-Científica</div>
</div>

<div class="section">
  <h2>Metodologia</h2>
  <div class="card">Análise técnica baseada em evidências</div>
  <div class="card">Validação científica dos elementos</div>
  <div class="card">Emissão de laudo pericial estruturado</div>
</div>

</body>
</html>
