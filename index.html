<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>INFRAJUS | Inteligência Pericial</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Georgia', serif; /* Fonte clássica e elegante */
            background: linear-gradient(135deg, #050811 0%, #1a1a2e 100%);
            color: #d4af37; /* Dourado */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 40px;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
        }
        p {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #ffffff;
            opacity: 0.8;
            margin-bottom: 40px;
        }
        .btn {
            border: 1px solid #d4af37;
            padding: 15px 30px;
            text-decoration: none;
            color: #d4af37;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn:hover {
            background-color: #d4af37;
            color: #050811;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>INFRAJUS</h1>
        <p>Inteligência Pericial & Psicologia Forense</p>
        <a href="mailto:contato@infrajus.com" class="btn">Entrar em contato</a>
    </div>
</body>
</html>
