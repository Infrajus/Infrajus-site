<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infrajus - Inteligência Pericial</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;

  background: radial-gradient(circle at center,
    #1b1f3f 0%,
    #0b1a2a 55%,
    #070d1a 100%);
}

/* leve camada de profundidade */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.55));
  pointer-events: none;
}

/* CONTAINER CENTRAL */
.container {
  text-align: center;
  z-index: 2;
  padding: 20px;
}

/* NOME PRINCIPAL */
h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 92px;
  letter-spacing: 14px;
  text-transform: uppercase;
  color: #eef2f6;
  position: relative;

  text-shadow:
    0 0 25px rgba(120,140,255,0.18),
    0 0 60px rgba(203,179,138,0.10);
}

/* efeito de brilho suave passando */
h1::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg,
    transparent 0%,
    rgba(255,255,255,0.10) 50%,
    transparent 100%);
  animation: shine 6s infinite;
}

@keyframes shine {
  0% { left: -120%; }
  50% { left: 120%; }
  100% { left: 120%; }
}

/* SUBTÍTULO */
p {
  margin-top: 12px;
  font-size: 20px;
  letter-spacing: 3px;
  color: #cfd6dd;
  opacity: 0.95;
}

/* LINHA DE DETALHE */
.line {
  width: 140px;
  height: 1px;
  margin: 28px auto;
  background: linear-gradient(90deg, transparent, #cbb38a, transparent
