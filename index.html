<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title>Infrajus - Perícia Criminal</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}

/* FUNDO */
.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url("783eb7e0-7719-11f1-9854-bd9a3755262a (1).png") center/cover no-repeat;
  filter: contrast(1.05) brightness(0.9);
}

/* OVERLAY FORENSE */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(11,26,42,0.65),
    rgba(11,26,42,0.85)
  );
}

/* SCANNER ANIMATION */
.scanner {
  position: absolute;
  width: 100%;
  height: 3px;
  background: rgba(203,179,138,0.35);
  top: 0;
  animation: scan 4s linear infinite;
  box-shadow: 0 0 20px rgba(203,179,138,0.2);
}

@keyframes scan {
  0% { top: 0; opacity: 0; }
  10% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { top: 100%; opacity: 0; }
}

/* CONTEÚDO CENTRAL */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: #d8dee6;
  z-index: 2;
}

h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 72px;
  letter-spacing: 10px;
  color: #e2e6ea;
  text-shadow: 0 0 25px rgba(0,0,0,0.6);
}

p {
  margin-top: 10px;
  font-size: 16px;
  color: #cfd6dd;
  letter-spacing: 1px;
}
